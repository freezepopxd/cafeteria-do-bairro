<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria do Bairro</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <style>
        .header {
            background-color: #ff7f50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .intro {
            margin-top: 20px;
            text-align: center;
            font-size: 1.2rem;
        }
        .cta-button {
            margin-top: 20px;
        }
        .image-container {
            text-align: center;
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <!-- Cabeçalho -->
    <header class="header">
        <h1>Cafeteria do Bairro</h1>
    </header>

    <!-- Descrição -->
    <section class="intro">
        <p>Bem-vindo à Cafeteria do Bairro! Oferecemos os melhores cafés e lanches fresquinhos para o seu dia começar bem. Venha nos visitar e aproveite o nosso ambiente aconchegante!</p>
    </section>

    <!-- Imagem -->
    <section class="image-container">
        <img src="https://via.placeholder.com/600x400/FF7F50/FFFFFF?text=Cafeteria" alt="Imagem Cafeteria">
    </section>

    <!-- Botão de Ação -->
    <section class="cta-button text-center">
        <a href="#fazer-pedido" class="btn btn-primary btn-lg">Fazer Pedido</a>
    </section>

    <!-- Bootstrap JS (opcional) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
